<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; width: 350px; padding: 15px; }
    h2 { margin-top: 0; color: #333; font-size: 18px; border-bottom: 2px solid #4CAF50; padding-bottom: 5px;}
    .input-group { margin-bottom: 15px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 13px; }
    input[type="text"], input[type="file"] { width: 100%; padding: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background-color: #4CAF50; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
    button:hover { background-color: #45a049; }
    #status { margin-top: 10px; font-size: 12px; color: #555; text-align: center; }
  </style>
</head>
<body>
  <h2>Salto Auto-Programmer</h2>
  
  <div class="input-group">
    <label>1. Conference Name:</label>
    <input type="text" id="confName" value="Washington Workshop">
  </div>

  <div class="input-group">
    <label>2. Select Housing Roster:</label>
    <input type="file" id="fileUpload" accept=".csv, .xlsx">
  </div>

  <button id="startBtn">3. Start Automation</button>
  <div id="status">Waiting for file...</div>

  <script src="papaparse.min.js"></script>
  <script src="xlsx.full.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
